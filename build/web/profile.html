<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <link rel="stylesheet" href="profile.css">
      <div class="navbar">
    <h2>🏫 CampusHub</h2>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a  id="profile" href="#">Profile</a>
      <a href="login.jsp">Logout</a>
    </div>
  </div>




  <div class="container">

        <h1>Student Profile</h1>

        <!-- Basic Information -->
        <div class="card">
            <h2>Basic Information</h2>
            <div class="info">
                <label>Full Name:</label>
                <span id="name">John Doe</span>
            </div>

            <div class="info">
                <label>Email:</label>
                <span id="email">john@example.com</span>
            </div>

            <div class="info">
                <label>Phone:</label>
                <span id="phone">9876543210</span>
            </div>

            <div class="info">
                <label>Date of Birth:</label>
                <span id="dob">01 Jan 2003</span>
            </div>
        </div>

        <!-- Educational Information -->
        <div class="card">
            <h2>Educational Information</h2>

            <div class="info">
                <label>College Name:</label>
                <span id="college">ABC College of Engineering</span>
            </div>

            <div class="info">
                <label>Course:</label>
                <span id="course">B.Tech Computer Science</span>
            </div>

            <div class="info">
                <label>Year:</label>
                <span id="year">3rd Year</span>
            </div>

            <div class="info">
                <label>CGPA:</label>
                <span id="cgpa">8.5</span>
            </div>
        </div>

        

    </div>
    <!-- <button onclick="editProfile()">Edit Profile</button>  -->
</body>
</html>
